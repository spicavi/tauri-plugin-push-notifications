name: Publish crates.io package

# Same trigger model as publish-npm.yml — fires on a published GitHub release,
# or on manual dispatch with a tag input. The release tag (`v0.2.0`) must
# match `Cargo.toml`'s `version` field, otherwise the workflow bails before
# touching crates.io.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Install Tauri system dependencies
        # `cargo publish` runs `cargo package --verify` which fully compiles
        # the crate before upload. Tauri 2.x's desktop runtime depends on
        # webkit2gtk + libsoup 3.x on Linux; without these the verify step
        # fails with `pkg-config exited with status code 1` on `webkit2gtk-4.1`.
        # Skip with `--no-verify` if you'd rather trust the upload — but the
        # verify catches packaging bugs that a published artifact can't undo.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Verify Cargo.toml version matches release tag
        run: |
          PKG_VERSION=$(awk -F'"' '/^version *= *"/ {print $2; exit}' Cargo.toml)
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          TAG_VERSION="${TAG#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Cargo.toml version ($PKG_VERSION) does not match release tag ($TAG_VERSION). Bump Cargo.toml + package.json together before tagging."
            exit 1
          fi

      - name: Publish to crates.io
        # cargo publish does its own auth via the token. It runs
        # `cargo package --verify` first by default — that's the slow step
        # (full compile of the published tarball in a clean dir), but it's
        # the only way to catch packaging bugs (missing files, bad excludes)
        # before the artifact is permanent on crates.io.
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
